version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pequenos-exploradores-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: tcc
      MYSQL_PASSWORD: ''
      MYSQL_DATABASE: tcc-mysql2.0
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/tcc-mysql2.0\ 1.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
